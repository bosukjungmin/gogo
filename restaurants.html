*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}

body{

/* 헤로 배너 */

}
.hero::before{

}
.hero-eyebrow{
  font-family:'DM Serif Display',serif;
  font-style:italic;

  letter-spacing:.15em;
  margin-bottom:1rem;
  position:relative;
}
.hero-title{
  font-family:'Instrument Serif',serif;
  color:#fff;
  font-size:clamp(2rem,5vw,3.2rem);
  line-height:1.15;

}
.hero-title span{color:var(--gold)}
.hero-sub{
  color:rgba(255,255,255,.6);

  font-weight:300;
  letter-spacing:.05em;
  position:relative;
}
.hero-line{
  width:60px;height:2px;

}
.hero-stats{

.hero-stat-item{text-align:center}
.hero-stat-num{

.hero-stat-lbl{color:rgba(255,255,255,.5);font-size:.75rem;letter-spacing:.1em;margin-top:.25rem}

/* 필터 바 */
.filter-wrap{
  position:sticky;top:0;z-index:100;
  background:var(--navy);
  border-bottom:1px solid rgba(201,168,76,.2);
  padding:.75rem 2rem;
}
.filter-inner{
  max-width:1200px;margin:0 auto;
  display:flex;gap:.5rem;flex-wrap:wrap;align-items:center;
}
.filter-label{
  color:rgba(255,255,255,.4);
  font-size:.75rem;letter-spacing:.1em;
  margin-right:.5rem;white-space:nowrap;
}
.filter-btn{

  font-size:.78rem;
  padding:.35rem .9rem;
  border-radius:20px;

  color:rgba(255,255,255,.6);

  transition:all .2s;
  white-space:nowrap;

.filter-btn:hover{border-color:var(--gold);color:var(--gold)}
.filter-btn.active{background:var(--gold);border-color:var(--gold);color:var(--navy);font-weight:500}

.grid{

.card{

}
.card:hover{

  box-shadow:0 16px 40px rgba(11,31,58,.12);
}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(16px)}
  to{opacity:1;transform:translateY(0)}

const VILLA={lat:15.1816,lng:120.5277};

function km(lat,lng){
  const R=6371,dLat=(lat-VILLA.lat)*Math.PI/180,dLng=(lng-VILLA.lng)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(VILLA.lat*Math.PI/180)*Math.cos(lat*Math.PI/180)*Math.sin(dLng/2)**2;
  const d=R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
  return d<1?(d*1000).toFixed(0)+'m':(d).toFixed(1)+'km';
}
function min(lat,lng){
  const R=6371,dLat=(lat-VILLA.lat)*Math.PI/180,dLng=(lng-VILLA.lng)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(VILLA.lat*Math.PI/180)*Math.cos(lat*Math.PI/180)*Math.sin(dLng/2)**2;
  return Math.max(2,Math.round(R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))/0.5));
}

let curCat='all';

function renderCards(){
  const grid=document.getElementById('grid');
  const filtered=curCat==='all'?RESTAURANTS:RESTAURANTS.filter(r=>{
    if(curCat==='기타') return !['한식','해산물','일식','이탈리안','뷔페'].includes(r.cat);
    return r.cat===curCat;
  });

  document.getElementById('result-count').innerHTML=
    `<strong>${filtered.length}곳</strong> 표시 중`;

  grid.innerHTML=filtered.map((r,i)=>{
    const d=km(r.lat,r.lng);
    const m=min(r.lat,r.lng);
    const rs=rankStyle(r.rank);
    const stripe=CAT_STRIPE[r.cat]||'#607D8B';
    const tagCls=CAT_TAG[r.cat]||'t-stk';
    const resColor=r.reserve==='필수'?'t-reserve-must':r.reserve==='없어도 됨'?'t-reserve-free':'t-reserve-good';
    const resLabel=r.reserve==='필수'?'예약 필수':r.reserve==='없어도 됨'?'예약 불필요':'예약 권장';
    const delay=(i%12)*0.04;
    return `
<div class="card" style="animation-delay:${delay}s">
  <div class="card-stripe" style="background:${stripe}"></div>
  <div class="card-body">
    <div class="card-row1">
      <div class="rank-circle" style="background:${rs.bg};color:${rs.c}">${r.rank}</div>
      <div class="card-title-wrap">
        <div class="card-name">${r.name}</div>
        <div class="card-sub">${r.sub}</div>
      </div>
    </div>
    <div class="rating-row">
      <span class="stars">${starStr(r.rating)}</span>
      <span class="rating-num">${r.rating}</span>
      <span class="review-cnt">(${r.cnt.toLocaleString()}개 리뷰)</span>
    </div>
    <div class="tag-row">
      <span class="tag ${tagCls}">${r.cat}</span>
      <span class="tag" style="background:#EFF3F8;color:#2C4A6E">${r.size} 수용</span>
      <span class="tag ${resColor}">${resLabel}</span>
    </div>
    <div class="info-table">
      <div class="info-row">
        <div class="info-key">숙소 거리</div>
        <div class="info-val distance">${d} · 차 약 ${m}분</div>
      </div>
      <div class="info-row">
        <div class="info-key">금액대</div>
        <div class="info-val price">${r.price}</div>
      </div>
      <div class="info-row">
        <div class="info-key">영업시간</div>
        <div class="info-val">${r.hours}</div>
      </div>
      <div class="info-row">
        <div class="info-key">전화·예약</div>
        <div class="info-val tel">${r.tel}</div>
      </div>
      <div class="info-row full">
        <div class="info-val" style="padding:.45rem .75rem;font-size:.73rem;color:#7A6E58">${r.contact}</div>
      </div>
    </div>
  </div>
  <div class="review-snip">${r.review}</div>
</div>`;
  }).join('');
}

document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    curCat=btn.dataset.cat;
    renderCards();
  });
});

renderCards();
</script>
